<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>jcd-editor (local-web)</title>
  </head>
  <body>
    <div class="app">
      <header class="app__header">
        <h1 class="app__title">jcd-editor (local-web)</h1>
        <div class="app__controls">
          <label class="app__kind-label" for="kind-selector">種別:</label>
          <select id="kind-selector" class="app__kind-select">
            <option value="rirekisho">履歴書</option>
            <option value="shokumukeirekisho">職務経歴書</option>
          </select>
          <span id="status" class="app__status" role="status" aria-live="polite"></span>
        </div>
        <div class="app__storage">
          <button type="button" id="save-button" class="app__storage-button">保存</button>
          <label class="app__storage-label" for="saved-profile-select">保存済み:</label>
          <select id="saved-profile-select" class="app__storage-select">
            <option value="">(選択してください)</option>
          </select>
          <button type="button" id="load-button" class="app__storage-button" disabled>
            読み込み
          </button>
        </div>
        <div class="app__io">
          <button type="button" id="export-button" class="app__io-button">JSON エクスポート</button>
          <label class="app__io-import">
            <span class="app__io-import-label">JSON インポート</span>
            <input
              type="file"
              id="import-file-input"
              class="app__io-file"
              accept="application/json,.json"
            />
          </label>
        </div>
      </header>
      <main class="app__main">
        <section class="app__form-pane" aria-label="基本情報フォーム">
          <form id="basics-form" class="basics-form" autocomplete="off" novalidate>
            <h2 class="basics-form__title">基本情報</h2>

            <div class="basics-form__row">
              <div class="basics-form__field">
                <label class="basics-form__label" for="name-family">姓</label>
                <input
                  id="name-family"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
              <div class="basics-form__field">
                <label class="basics-form__label" for="name-given">名</label>
                <input
                  id="name-given"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
            </div>

            <div class="basics-form__row">
              <div class="basics-form__field">
                <label class="basics-form__label" for="name-kana-family">セイ</label>
                <input
                  id="name-kana-family"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
              <div class="basics-form__field">
                <label class="basics-form__label" for="name-kana-given">メイ</label>
                <input
                  id="name-kana-given"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
            </div>

            <div class="basics-form__field">
              <label class="basics-form__label" for="birth-date">生年月日</label>
              <input id="birth-date" class="basics-form__input" type="date" />
            </div>

            <div class="basics-form__field">
              <label class="basics-form__label" for="email">メールアドレス</label>
              <input
                id="email"
                class="basics-form__input"
                type="email"
                inputmode="email"
                spellcheck="false"
              />
            </div>

            <div class="basics-form__field">
              <label class="basics-form__label" for="phone">電話番号</label>
              <input
                id="phone"
                class="basics-form__input"
                type="tel"
                inputmode="tel"
                spellcheck="false"
              />
            </div>

            <div class="basics-form__field">
              <label class="basics-form__label" for="postal-code">郵便番号</label>
              <input
                id="postal-code"
                class="basics-form__input"
                type="text"
                inputmode="text"
                spellcheck="false"
              />
            </div>

            <div class="basics-form__field">
              <label class="basics-form__label" for="prefecture">都道府県</label>
              <input
                id="prefecture"
                class="basics-form__input"
                type="text"
                inputmode="text"
                spellcheck="false"
              />
            </div>

            <div class="basics-form__field">
              <label class="basics-form__label" for="city-and-rest">住所</label>
              <input
                id="city-and-rest"
                class="basics-form__input"
                type="text"
                inputmode="text"
                spellcheck="false"
              />
            </div>

            <pre
              id="basics-validation-issues"
              class="basics-form__validation"
              role="status"
              aria-live="polite"
              hidden
            ></pre>
          </form>
          <section class="work-experiences-form" aria-label="職務経歴">
            <header class="work-experiences-form__header">
              <h2 class="work-experiences-form__title">職務経歴</h2>
              <button
                type="button"
                id="add-work-experience-button"
                class="work-experiences-form__add-button"
              >
                職歴を追加
              </button>
            </header>
            <div id="work-experiences-list" class="work-experiences-form__list"></div>
          </section>
          <section class="education-form" aria-label="学歴">
            <header class="education-form__header">
              <h2 class="education-form__title">学歴</h2>
              <button
                type="button"
                id="add-education-button"
                class="education-form__add-button"
              >
                学歴を追加
              </button>
            </header>
            <div id="education-list" class="education-form__list"></div>
          </section>
          <section class="skills-form" aria-label="スキル">
            <header class="skills-form__header">
              <h2 class="skills-form__title">スキル</h2>
              <button type="button" id="add-skill-button" class="skills-form__add-button">
                スキルを追加
              </button>
            </header>
            <div id="skills-list" class="skills-form__list"></div>
          </section>
        </section>
        <section class="app__preview-pane" aria-label="プレビュー">
          <iframe
            id="preview-frame"
            class="app__preview"
            title="ドキュメントプレビュー"
            sandbox=""
          ></iframe>
          <pre id="error-area" class="app__error" hidden></pre>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
