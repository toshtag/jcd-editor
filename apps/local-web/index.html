<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>jcd-editor (local-web)</title>
    <!--
      履歴書 template (rirekisho-mhlw-a4) は公式 PDF を pdffonts 解析した結果、
      MS-Mincho / MS-PMincho の明朝のみで構成されていることを確認済み。よって
      Web Font は Noto Serif JP の 1 つに絞る (template CSS で
      Yu Mincho / MS Mincho / Hiragino Mincho ProN への fallback chain も指定)。
      preconnect は fonts.googleapis.com と fonts.gstatic.com の両方に必要
      (CSS / フォント本体が別 origin)。
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <a class="skip-link" href="#preview-frame">プレビューにスキップ</a>
    <div class="app">
      <header class="app__header">
        <h1 class="app__title">jcd-editor (local-web)</h1>
        <div class="app__controls">
          <label class="app__kind-label" for="kind-selector">種別:</label>
          <select id="kind-selector" class="app__kind-select">
            <option value="rirekisho">履歴書</option>
            <option value="shokumukeirekisho">職務経歴書</option>
          </select>
          <span id="status" class="app__status" role="status" aria-live="polite"></span>
          <span
            id="dirty-indicator"
            class="app__dirty-indicator"
            role="status"
            aria-live="polite"
            hidden
            >● 未保存</span
          >
        </div>
        <div class="app__storage">
          <button type="button" id="save-button" class="app__storage-button">保存</button>
          <label class="app__storage-label" for="saved-profile-select">保存済み:</label>
          <select id="saved-profile-select" class="app__storage-select">
            <option value="">(選択してください)</option>
          </select>
          <button type="button" id="load-button" class="app__storage-button" disabled>
            読み込み
          </button>
          <button
            type="button"
            id="delete-button"
            class="app__storage-button app__storage-button--danger"
            disabled
          >
            削除
          </button>
        </div>
        <div class="app__io">
          <button type="button" id="export-button" class="app__io-button">JSON エクスポート</button>
          <label class="app__io-import">
            <span class="app__io-import-label">JSON インポート</span>
            <input
              type="file"
              id="import-file-input"
              class="app__io-file"
              accept="application/json,.json"
            />
          </label>
          <button type="button" id="print-button" class="app__io-button">PDF 出力</button>
          <button type="button" id="add-history-row-button" class="app__io-button" hidden>
            学歴・職歴 1 行追加
          </button>
          <button type="button" id="add-certification-row-button" class="app__io-button" hidden>
            資格 1 行追加
          </button>
        </div>
      </header>
      <main class="app__main">
        <!--
          Phase 2.1b — WYSIWYG エディタ。履歴書 kind 選択時のみ visible。
          renderer (editable=true) の出力 HTML をここに直接 innerHTML する。
          各 [data-field] が contenteditable="plaintext-only" になる。
        -->
        <section
          id="wysiwyg-editor"
          class="app__wysiwyg-pane"
          aria-label="履歴書 WYSIWYG エディタ"
          hidden
        ></section>
        <section class="app__form-pane" aria-label="基本情報フォーム">
          <div
            id="validation-summary"
            class="validation-summary"
            role="status"
            aria-live="polite"
            hidden
          >
            <div class="validation-summary__heading">入力エラー</div>
            <ul id="validation-summary-list" class="validation-summary__list"></ul>
          </div>
          <form
            id="basics-form"
            class="basics-form"
            autocomplete="off"
            novalidate
            data-section="basics"
          >
            <h2 class="basics-form__title">基本情報</h2>

            <div class="profile-photo" data-section="profilePhoto">
              <div class="profile-photo__thumbnail-wrapper">
                <img id="profile-photo-thumbnail" class="profile-photo__thumbnail" alt="" hidden />
                <span
                  id="profile-photo-placeholder"
                  class="profile-photo__placeholder"
                  aria-hidden="true"
                  >証明写真</span
                >
              </div>
              <div class="profile-photo__controls">
                <label class="profile-photo__select-label">
                  <span class="profile-photo__select-label-text">写真を選択</span>
                  <input
                    type="file"
                    id="profile-photo-input"
                    class="profile-photo__file"
                    accept="image/jpeg,image/png"
                  />
                </label>
                <button
                  type="button"
                  id="profile-photo-remove-button"
                  class="profile-photo__remove-button"
                  disabled
                >
                  写真を削除
                </button>
                <p class="profile-photo__hint">
                  対応形式: JPEG / PNG、最大 10 MB。大きな画像は自動で縮小されます。写真は個人情報として扱われ、ブラウザ内で
                  data URI 化されます (外部送信なし)。
                </p>
                <p
                  id="profile-photo-error"
                  class="profile-photo__error"
                  role="status"
                  aria-live="polite"
                  hidden
                ></p>
              </div>
            </div>

            <div class="basics-form__row">
              <div class="basics-form__field">
                <label class="basics-form__label" for="name-family">姓</label>
                <input
                  id="name-family"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
              <div class="basics-form__field">
                <label class="basics-form__label" for="name-given">名</label>
                <input
                  id="name-given"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
            </div>

            <div class="basics-form__row">
              <div class="basics-form__field">
                <label class="basics-form__label" for="name-kana-family">セイ</label>
                <input
                  id="name-kana-family"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
              <div class="basics-form__field">
                <label class="basics-form__label" for="name-kana-given">メイ</label>
                <input
                  id="name-kana-given"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
            </div>

            <div class="basics-form__field">
              <label class="basics-form__label" for="birth-date">生年月日</label>
              <input id="birth-date" class="basics-form__input" type="date" />
            </div>

            <div class="basics-form__field">
              <label class="basics-form__label" for="gender">性別 (任意)</label>
              <input
                id="gender"
                class="basics-form__input"
                type="text"
                inputmode="text"
                spellcheck="false"
                placeholder="例: 男性 / 女性 / 記載しない"
              />
              <p class="basics-form__hint">
                ※「性別」欄の記載は任意です。未記載とすることも可能です。
              </p>
            </div>

            <div class="basics-form__field">
              <label class="basics-form__label" for="email">メールアドレス</label>
              <input
                id="email"
                class="basics-form__input"
                type="email"
                inputmode="email"
                spellcheck="false"
              />
            </div>

            <div class="basics-form__field">
              <label class="basics-form__label" for="phone">電話番号</label>
              <input
                id="phone"
                class="basics-form__input"
                type="tel"
                inputmode="tel"
                spellcheck="false"
              />
            </div>

            <fieldset class="basics-form__group" data-section="address">
              <legend class="basics-form__group-title">現住所</legend>
              <div class="basics-form__field">
                <label class="basics-form__label" for="address-kana">ふりがな</label>
                <input
                  id="address-kana"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
              <div class="basics-form__field">
                <label class="basics-form__label" for="postal-code">郵便番号</label>
                <input
                  id="postal-code"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
              <div class="basics-form__field">
                <label class="basics-form__label" for="prefecture">都道府県</label>
                <input
                  id="prefecture"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
              <div class="basics-form__field">
                <label class="basics-form__label" for="city-and-rest">住所</label>
                <input
                  id="city-and-rest"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
            </fieldset>

            <fieldset class="basics-form__group" data-section="contactAddress">
              <legend class="basics-form__group-title">連絡先 (現住所以外を希望する場合のみ)</legend>
              <div class="basics-form__field">
                <label class="basics-form__label" for="contact-address-kana">ふりがな</label>
                <input
                  id="contact-address-kana"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
              <div class="basics-form__field">
                <label class="basics-form__label" for="contact-postal-code">郵便番号</label>
                <input
                  id="contact-postal-code"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
              <div class="basics-form__field">
                <label class="basics-form__label" for="contact-prefecture">都道府県</label>
                <input
                  id="contact-prefecture"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
              <div class="basics-form__field">
                <label class="basics-form__label" for="contact-city-and-rest">住所</label>
                <input
                  id="contact-city-and-rest"
                  class="basics-form__input"
                  type="text"
                  inputmode="text"
                  spellcheck="false"
                />
              </div>
              <div class="basics-form__field">
                <label class="basics-form__label" for="contact-phone">電話番号</label>
                <input
                  id="contact-phone"
                  class="basics-form__input"
                  type="tel"
                  inputmode="tel"
                  spellcheck="false"
                />
              </div>
            </fieldset>

            <div class="basics-form__field">
              <label class="basics-form__label" for="summary"
                >志望の動機、特技、好きな学科、アピールポイントなど</label
              >
              <textarea
                id="summary"
                class="basics-form__textarea"
                rows="6"
                spellcheck="false"
              ></textarea>
            </div>

            <div class="basics-form__field">
              <label class="basics-form__label" for="personal-request">本人希望記入欄</label>
              <textarea
                id="personal-request"
                class="basics-form__textarea"
                rows="4"
                spellcheck="false"
                placeholder="特に給料・職種・勤務時間・勤務地・その他についての希望などがあれば記入"
              ></textarea>
            </div>

            <div class="basics-form__field">
              <label class="basics-form__label" for="prepared-on">作成日 (年月日現在)</label>
              <input id="prepared-on" class="basics-form__input" type="date" />
            </div>

          </form>
          <section
            class="work-experiences-form"
            data-section="workExperiences"
            aria-label="職務経歴"
          >
            <header class="work-experiences-form__header">
              <h2 class="work-experiences-form__title">職務経歴</h2>
              <button
                type="button"
                id="add-work-experience-button"
                class="work-experiences-form__add-button"
              >
                職歴を追加
              </button>
            </header>
            <div id="work-experiences-list" class="work-experiences-form__list"></div>
          </section>
          <section class="education-form" data-section="educationHistory" aria-label="学歴">
            <header class="education-form__header">
              <h2 class="education-form__title">学歴</h2>
              <button
                type="button"
                id="add-education-button"
                class="education-form__add-button"
              >
                学歴を追加
              </button>
            </header>
            <div id="education-list" class="education-form__list"></div>
          </section>
          <section class="skills-form" data-section="skills" aria-label="スキル">
            <header class="skills-form__header">
              <h2 class="skills-form__title">スキル</h2>
              <button type="button" id="add-skill-button" class="skills-form__add-button">
                スキルを追加
              </button>
            </header>
            <div id="skills-list" class="skills-form__list"></div>
          </section>
          <section class="certifications-form" data-section="certifications" aria-label="資格">
            <header class="certifications-form__header">
              <h2 class="certifications-form__title">資格</h2>
              <button
                type="button"
                id="add-certification-button"
                class="certifications-form__add-button"
              >
                資格を追加
              </button>
            </header>
            <div id="certifications-list" class="certifications-form__list"></div>
          </section>
          <section class="projects-form" data-section="projects" aria-label="プロジェクト">
            <header class="projects-form__header">
              <h2 class="projects-form__title">プロジェクト</h2>
              <button type="button" id="add-project-button" class="projects-form__add-button">
                プロジェクトを追加
              </button>
            </header>
            <div id="projects-list" class="projects-form__list"></div>
          </section>
        </section>
        <section class="app__preview-pane" aria-label="プレビュー">
          <iframe
            id="preview-frame"
            class="app__preview"
            title="ドキュメントプレビュー"
            sandbox=""
          ></iframe>
          <pre id="error-area" class="app__error" role="alert" hidden></pre>
        </section>
      </main>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
